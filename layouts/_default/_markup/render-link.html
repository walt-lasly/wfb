{{- $dest := .Destination -}}
{{- $isExternal := and $dest (not (hasPrefix $dest "/")) (not (hasPrefix $dest "#")) -}}
{{- if and (not $isExternal) (hasPrefix $dest "/") -}}
  {{- $dest = printf "%s%s" .Page.Site.Home.RelPermalink (strings.TrimPrefix "/" $dest) -}}
{{- end -}}
<a href="{{ $dest | safeURL }}"
  {{- with .Title }} title="{{ . }}"{{ end }}
  {{- if $isExternal }} target="_blank" rel="noopener noreferrer"{{ end -}}
>{{ .Text | safeHTML }}</a>
